<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시스템 접속 안내</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background-color: #0d1117; color: #c9d1d9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #161b22; padding: 40px; border-radius: 10px; border: 1px solid #30363d; max-width: 500px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h1 { color: #f85149; font-size: 1.2rem; margin-bottom: 20px; }
        p { font-size: 0.9rem; line-height: 1.6; color: #8b949e; }
        .agree { color: #58a6ff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h1>⚠️ 개인정보 수집 및 이용 동의 안내</h1>
        <p>본 사이트는 보안 유지 및 접속 환경 최적화를 위해 접속자의 <br> <strong>[IP, OS, 브라우저 정보, 해상도]</strong>를 자동 수집합니다.</p>
        <p class="agree">사이트 접속 시 위 정보 수집에 동의한 것으로 간주됩니다.</p>
        <p>동의하지 않으시면 즉시 창을 닫아주시기 바랍니다.</p>
    </div>

    <script>
        // 접속 정보 추출 및 전송
        (function() {
            const clientInfo = {
                screen: `${window.screen.width}x${window.screen.height}`,
                language: navigator.language,
                platform: navigator.platform
            };

            fetch('/webhook', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(clientInfo)
            })
            .then(res => console.log('Log recorded'))
            .catch(err => console.error('Log error'));
        })();
    </script>
</body>
</html>
