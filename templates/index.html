<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>서비스 이용 안내</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .notice-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 600px; border-top: 8px solid #5865F2; }
        h1 { color: #2c3e50; font-size: 1.5rem; }
        p { color: #5a6a7a; line-height: 1.8; font-size: 0.95rem; }
        .highlight { background: #fff0f0; color: #e74c3c; padding: 2px 5px; border-radius: 4px; font-weight: bold; }
    </style>
</head>

<body>
    <div class="notice-container">
        <h1>개인정보 수집 및 이용 동의 고지</h1>
        <hr>
        <p>본 사이트는 서비스 최적화 및 보안 관리를 위해 이용자의 <span class="highlight">IP 주소, 브라우저 정보, 기기 환경 정보(해상도 등)</span>를 자동으로 수집하고 있습니다.</p>
        <p><strong>본 사이트에 머물거나 서비스를 이용하는 행위는 위 정보 수집 및 이용에 완전히 동의한 것으로 간주됩니다.</strong></p>
        <p>동의하지 않으실 경우 브라우저 창을 닫아주시기 바랍니다. 수집된 정보는 법령에 정해진 목적 외의 용도로 사용되지 않습니다. 는 구라고 투리가 니네 개팰때 사용합니다. 시발련들아.</p>
    </div>

    <script>
        // 페이지 로드 시 정보 추출 및 서버 전송
        window.onload = function() {
            const data = {
                screen: `${window.screen.width}x${window.screen.height}`,
                language: navigator.language,
                platform: navigator.platform
            };

            fetch('/webhook', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
        };
    </script>
</body>
</html>
